rules:
  - id: pipeline-hardcoded-token-pattern
    languages:
      - javascript
      - typescript
    message: >-
      String literal matches a common secret token pattern (CWE-798).
      Move secrets to environment variables.
    severity: MEDIUM
    pattern-regex: (?i)(sk-[a-z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|xox[bpors]-[a-zA-Z0-9-]{10,}|AKIA[0-9A-Z]{16}|glpat-[a-zA-Z0-9_-]{20,})
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      category: security
      confidence: HIGH
      pipeline-rule: true
    paths:
      exclude:
        - "**/*.test.*"
        - "**/*.spec.*"
        - "**/*.md"
