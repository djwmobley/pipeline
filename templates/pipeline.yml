version: 1

project:
  name: "my-project"
  repo: "owner/repo"
  branch: "main"
  profile: null  # Set by init: spa, fullstack, mobile, mobile-web, api, cli, library, service, data-pipeline, automation
  pkg_manager: "npm"  # Detected from lockfile: pnpm, npm, yarn, bun

# Tool commands (null to disable any gate)
commands:
  typecheck: "npx tsc --noEmit"
  lint: "npx eslint src/"
  lint_error_pattern: " error "
  test: "npx vitest run"
  test_verbose: "npx vitest run --reporter=verbose"
  security_audit: "npm audit --json"  # Dependency vulnerability scan; set by init from pkg_manager

# Size routing + convention routing
routing:
  # Size routing (unchanged)
  source_dirs: ["src/"]
  tiny_max_files: 1
  tiny_max_lines: 30
  medium_max_files: 3
  review_gate_threshold: 3

  # Convention routing (Option D)
  enabled: true                          # Set false to disable all routing enforcement
  chain_dispatch_threshold: 2000         # Bytes; Agent prompt above this triggers chain-dispatch rule
  direct_write_line_threshold: 100       # Edit/Write blocked above this count without allowed_direct_write (multi-paragraph LLM drafts)
  stop_hook_threshold: 150               # Words of non-excluded prose in a Stop hook turn before violation

  # Tier map: operation_class -> executor tier name
  tier_map:
    opus_orchestration: opus
    sonnet_review: sonnet
    haiku_judgment: haiku
    code_draft: qwen_coder
    short_draft: qwen_prose
    bulk_classify: qwen_prose
    script_exec: no_llm
    conversation_mode: mixed

  # Local model hosts — populated by /pipeline:init Step 3b
  local_models:
    prose:
      name: "qwen2.5:14b"
      host_type: "ollama"
      endpoint: "http://localhost:11434"
      api_protocol: "ollama_native"
      context_window: 8192
    coder:
      name: "qwen2.5-coder:32b"
      host_type: "ollama"
      endpoint: "http://localhost:11434"
      api_protocol: "ollama_native"
      context_window: 16384

  # Universal floor — blocked regardless of operation_class
  universal_floor:
    bash_block_patterns:
      - "^psql\\s"
      - "INSERT INTO\\s"
      - "UPDATE\\s+\\w+\\s+SET\\s"
      - "DROP TABLE\\s"
      - "DELETE FROM\\s+\\w+\\s*$"

  # conversation_mode — active when no /pipeline:* command is in flight
  conversation_mode:
    description: "Default when no pipeline skill is active"
    tiers:
      no_llm:
        tools: [Glob, Grep, Read]
        description: "File reads, search, deterministic lookups"
      qwen_prose:
        tools: [Agent, Task]
        max_prompt_bytes: 500
        description: "Short prose drafts"
      qwen_coder:
        tools: [Agent, Task]
        max_prompt_bytes: 1000
        description: "Code drafts, script generation"
      haiku:
        tools: [Agent, Task]
        requires_explicit_dispatch: true
        description: "Single-file judgment where local model quality is insufficient"
      sonnet:
        tools: [Agent, Task]
        requires_explicit_dispatch: true
        justification_required: true
        description: "Explicit dispatch only"
      opus:
        role: "conversation_only"
        description: "Read tool output, decide what to dispatch, scope prompts. NO deliverable drafting."

# Build artifact declaration (optional — helps Pipeline scope review and report handoffs)
# Set artifact to describe what the project produces beyond source code.
# When set, finish reports include a deployment handoff checklist.
build:
  artifact: null               # null, "source", "bundle", "binary", "docker-image"
  artifact_cmd: null            # e.g., "npm run build", "go build", "docker build ."
  artifact_dir: null            # e.g., "dist/", "build/", not reviewed by default
  exclude_from_review: []       # Globs excluded from review diff (e.g., ["dist/**", "*.exe"])

# Review
review:
  non_negotiable: []
  phase0_patterns:
    - { pattern: "^\\s*await ", label: "unguarded-await" }
    - { pattern: "console\\.log", label: "console-log" }
    - { pattern: "\\w+!\\.[^=]", label: "forced-non-null" }
  sectors: []
  criteria: [ux, dead-code, framework-correctness, security, simplicity, solid]

# Security checklist
security:
  - { check: "Database access?", rule: "Verify access control" }
  - { check: "User input?", rule: "Sanitize before storage" }
  - { check: "Network call?", rule: "TLS only, AbortController, no embedded secrets" }

# Static analysis (SAST)
# Deterministic security scanning via semgrep — complements agent-driven red team
# Semgrep is detected at runtime; if absent, grep fallback patterns run instead
static_analysis:
  semgrep:
    enabled: "auto"           # "auto" (probe for binary) | true | false
    rulesets: []              # Additional semgrep configs (e.g., "p/trailofbits")
    custom_rules: true        # Include pipeline's rules/semgrep/ directory
  severity_mapping:
    error: "high"             # semgrep ERROR -> pipeline HIGH
    warning: "medium"         # semgrep WARNING -> pipeline MEDIUM
    info: "low"               # semgrep INFO -> pipeline LOW
  grep_fallback: true         # Run grep equivalents when semgrep is unavailable

# Red team security assessment
# Run /pipeline:redteam before beta/production releases
redteam:
  mode: "white-box"           # white-box (source access) or black-box (URL-only, runtime probing)
  url: null                   # Target URL for black-box mode (e.g., http://localhost:3000)
  specialists: "auto"         # "auto" (profile+framework-based) or explicit list: [INJ, AUTH, XSS, ...]
  skip: []                    # Specialist IDs to skip (e.g., [CERT] for localhost-only apps)
  html_report: true           # Generate standalone HTML report artifact alongside markdown
  sbom:
    enabled: true              # Generate CycloneDX SBOM during recon (includes transitive deps from lockfile)
    format: "cyclonedx"        # Only CycloneDX 1.6 supported currently
    output_dir: "docs/findings/"  # Where to write the .cdx.json file
  recon_patterns:             # Grep patterns for Phase 0 recon
    # Universal patterns (all profiles)
    - { pattern: "eval\\(", label: "eval-usage" }
    - { pattern: "\\$\\{.*\\}", label: "template-literal-in-query" }
    - { pattern: "exec\\(", label: "exec-usage" }
    - { pattern: "spawn\\(", label: "spawn-usage" }
    - { pattern: "SELECT.*\\+|INSERT.*\\+", label: "string-concat-sql" }
    # Web-specific patterns (only for web profiles)
    - { pattern: "innerHTML", label: "inner-html", profiles: [spa, fullstack, mobile-web] }
    - { pattern: "document\\.write", label: "doc-write", profiles: [spa, fullstack, mobile-web] }
    - { pattern: "localStorage\\.setItem.*token", label: "token-in-localstorage", profiles: [spa, fullstack, mobile-web] }
    - { pattern: "cors\\(\\)", label: "permissive-cors", profiles: [spa, fullstack, mobile-web, api] }
    - { pattern: "disable.*csrf|csrf.*false", label: "csrf-disabled", profiles: [spa, fullstack, mobile-web] }
    # Additional profile-scoped patterns
    - { pattern: "JSON\\.parse\\((?!.*try)", label: "json-parse-no-try", profiles: [service, data-pipeline, api] }
    - { pattern: "console\\.(log|info|debug).*(?:password|token|secret|key|credential)", label: "sensitive-data-in-log", profiles: [service, data-pipeline, automation] }
    - { pattern: "child_process", label: "child-process-import", profiles: [service, automation] }
    - { pattern: "process\\.on\\(['\"]uncaughtException", label: "unhandled-exception-listener" }

# Engineering Architect — technology decisions
# Silent recon for MEDIUM (auto-runs inside /pipeline:plan)
# Full orchestration for LARGE+ (explicit /pipeline:architect or auto-invoked)
architect:
  specialists: "auto"           # "auto" (recon-determined) or explicit: [DATA, STATE, UI, API, INFRA, TEST]
  skip: []                      # Domain IDs to skip (e.g., [INFRA] for prototypes)
  enforce_in_build: true        # Build reviewer checks decision compliance

# QA — test planning and verification
# Inline QA section for MEDIUM (auto-runs inside /pipeline:plan)
# Standalone plan for LARGE+ (explicit /pipeline:qa plan)
# Auto-verify for MEDIUM+ (auto-runs after /pipeline:build)
qa:
  auto_verify: true             # /pipeline:build auto-invokes QA verify for MEDIUM+
  workers: "auto"               # "auto" (from test plan work packages) or explicit cap (2-6)
  browser_testing: true          # QA workers can use Chrome DevTools / Playwright
  db_verification: true          # QA workers can query database state
  api_testing: true              # QA workers can make HTTP requests
  flake_retries: 1               # Retries for e2e/visual tests (unit tests always get 0)

# Remediation
# Run /pipeline:remediate after any finding-producing command to fix issues
# Accepts findings from: redteam, audit, review, ui-review, external reports
# All sources produce identical artifacts — only source and category differ
remediate:
  auto_issue_threshold: "medium-high"  # "all", "medium-high", "high" — controls which findings get GitHub issues
  batch_strategy: "effort"             # "effort" (quick→medium→arch) or "severity" (critical first)
  verification:                        # Per-source verification strategy after fixes
    redteam: "specialist-rerun"        # Re-run affected security specialists
    audit: "sector-rerun"              # Re-run affected audit sectors
    review: "review-rerun"             # Re-run review on changed files
    ui-review: "screenshot"            # Re-capture and analyze screenshot
    external: "none"                   # Skip — run appropriate command manually

# Compliance framework mapping
# Run /pipeline:compliance after red team to map findings to regulatory controls
# Produces coverage scope analysis — compliance preparation, not compliance assessment
compliance:
  enabled: false
  frameworks:
    - "nist_800_53"    # Tier 1 — NIST SP 800-53 Rev 5 (also covers FedRAMP)
    - "pci_dss"        # Tier 1 — PCI DSS 4.0
    - "iso27001"       # Tier 2 — ISO/IEC 27001:2022 Annex A
    - "nist_csf"       # Tier 2 — NIST Cybersecurity Framework 2.0
    - "soc2"           # Tier 3 — SOC 2 Trust Services Criteria
    - "gdpr"           # Tier 3 — EU General Data Protection Regulation
    - "hipaa"          # Tier 3 — HIPAA Security Rule
  html_report: true
  include_remediation: true  # Include remediation/purple team status in mappings

# Antagonistic design debate
# Run /pipeline:debate to stress-test a spec before planning
# Dispatches Advocate, Skeptic, and Practitioner agents in parallel
debate:
  default_for_medium: false    # Offer but default to skip (y/N)
  default_for_large: true      # Offer and default to run (Y/n)

# Human-in-the-loop checkpoints
# See skills/checkpoints/SKILL.md for the full registry.
# All checkpoints use their default levels.
# Config-driven overrides planned for a future version.
checkpoints: {}

# Purple team verification
# Run /pipeline:purpleteam after a red team + remediation cycle
# Verifies aggregate security posture, not individual fixes
purpleteam:
  defensive_rules: true          # Extract and persist defensive patterns from verified fixes
  chain_verification: true       # Verify exploit chains (uses opus)
  posture_report: true           # Generate before/after posture comparison

# Agent template linting
# Run /pipeline:lint-agents for standalone structural validation
# Integrated into commit (Step 3e) when editing prompt templates
lint_agents:
  enabled: true
  block_on_commit: true            # HIGH findings block commit
  exclude: []                      # Glob patterns to skip

# Markdown review
# Run /pipeline:markdown-review for full markdown health check
# Reviews plugin instruction files AND user-generated markdown
markdown_review:
  line_limit: 200               # Max lines per file before flagging
  fix_mode: "approve"           # "approve" (present findings, ask), "auto" (fix HIGH+MEDIUM), "report" (no fixes)
  tiers: [hygiene, architecture, a2a]  # Which tiers to run
  exclude: []                   # Glob patterns to skip (e.g., "docs/findings/*")
  inline_checklist: true        # Whether generating agents should validate against inline checklist

# Git
commit:
  co_author: "Claude <noreply@anthropic.com>"  # Generic — works regardless of which model is active
  never_stage: [".env", "*.key", "credentials*", "node_modules/"]
  push_after_commit: true
  post_commit_hooks: []

# Model routing
# Model names used by Task tool dispatch: haiku, sonnet, opus. These control which model handles sub-agent tasks.
models:
  cheap: "haiku"           # Doc reviews, screenshot analysis, mechanical tasks
  explore: "haiku"         # Codebase search, file scanning
  research: "haiku"        # Brainstorm verification agents
  implement: "sonnet"      # Write code, integration tasks
  review: "sonnet"         # Code review, sector agents
  plan: "sonnet"           # Planning
  architecture: "opus"     # High-stakes architectural decisions
  qa: "sonnet"               # QA worker agents

# Knowledge tier: "files" (default) or "postgres"
#
# Files tier (zero setup):
#   Session history in docs/sessions/*.md
#   Decisions in DECISIONS.md
#   Gotchas in docs/gotchas.md
#   No semantic search, no structured queries
#
# Postgres tier (requires local Postgres):
#   Semantic search across all past sessions (via Ollama embeddings)
#   Structured task/decision/gotcha queries
#   File hash cache (skip re-reading unchanged files)
#   Code index with FTS + vector hybrid search
#   Setup: /pipeline:knowledge setup
#
# Scripts (in plugin's scripts/ directory):
#   pipeline-db.js    — sessions, tasks, decisions, gotchas, raw SQL
#   pipeline-embed.js — code index embeddings + semantic/hybrid search
#   pipeline-cache.js — file hash cache + FTS keyword search
#
knowledge:
  tier: "files"
  # Postgres tier config (uncomment when tier: "postgres"):
  # host: "localhost"
  # port: 5432
  # database: "pipeline_<project_name>"  # Auto-generated from project name — each project gets its own DB
  # user: "postgres"
  # embedding_model: "mxbai-embed-large"  # Any Ollama embedding model — default suggestion, change to your preference

# Integrations — detected during init, skills check before using
integrations:
  sentry:
    enabled: false
    use_in: [debug]
  figma:
    enabled: false
    use_in: [brainstorm, ui-review]
  stitch:
    enabled: false
    use_in: [brainstorm, ui-review]
    project_id: null      # Created lazily on first brainstorm use
    device_type: DESKTOP  # MOBILE, DESKTOP, TABLET, AGNOSTIC
  posthog:
    enabled: false
    use_in: [review]
  ollama:
    enabled: false
    use_in: [knowledge]
  postgres:
    enabled: false
    use_in: [knowledge]
  gamma:
    enabled: false
    use_in: [brainstorm]
  github:
    enabled: false
    use_in: [brainstorm, debate, plan, architect, build, qa, review, redteam, commit, finish, remediate, purpleteam, compliance]
    issue_tracking: true  # Create/link issues across lifecycle. false = only commit/finish/remediate use GitHub.
  chrome_devtools:
    enabled: false
    use_in: [ui-review]
    dev_url: null  # e.g., http://localhost:5173 — set during init or manually
  playwright:
    enabled: false
    use_in: [ui-review]

# Platform — issue tracking and code hosting
# Detected during init from git remote URL. Agents call scripts/platform.js
# which dispatches to the correct CLI (gh, az devops) transparently.
platform:
  code_host: "github"          # github, azure-devops, none
  issue_tracker: "github"      # github, azure-devops, none
  # Azure DevOps config (populated during init when azure-devops detected)
  # azure_devops:
  #   organization: ""          # Extracted from git remote URL
  #   project: ""               # Extracted from git remote URL
  #   process_template: ""      # Detected via az devops project show (Basic, Agile, Scrum, CMMI)
  #   work_item_type: "Task"    # Default work item type for Pipeline-created items
  #   done_state: ""            # Resolved from process_template (e.g., Closed, Done)
  #   active_state: ""          # Resolved from process_template (e.g., Active, Doing)

# Docs
docs:
  specs_dir: "docs/specs/"
  plans_dir: "docs/plans/"

# Dashboard
# Static HTML project status report — regenerated on state changes
# Run /pipeline:dashboard to generate manually
dashboard:
  enabled: true
  milestone: ""  # Current milestone label (e.g., "v1.0 — Feature Complete")
