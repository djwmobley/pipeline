version: 1

project:
  name: "my-project"
  repo: "owner/repo"
  branch: "main"
  profile: null  # Set by init: spa, fullstack, mobile, mobile-web, api, cli, library
  pkg_manager: "npm"  # Detected from lockfile: pnpm, npm, yarn, bun

# Tool commands (null to disable any gate)
commands:
  typecheck: "npx tsc --noEmit"
  lint: "npx eslint src/"
  lint_error_pattern: " error "
  test: "npx vitest run"
  test_verbose: "npx vitest run --reporter=verbose"

# Size routing
routing:
  source_dirs: ["src/"]
  tiny_max_files: 1
  tiny_max_lines: 30
  medium_max_files: 3
  review_gate_threshold: 3   # files changed >= this requires review

# Review
review:
  non_negotiable: []
  phase0_patterns:
    - { pattern: "^\\s*await ", label: "unguarded-await" }
    - { pattern: "console\\.log", label: "console-log" }
    - { pattern: "\\w+!\\.[^=]", label: "forced-non-null" }
  sectors: []
  criteria: [ux, dead-code, framework-correctness, security, simplicity, solid]

# Security checklist
security:
  - { check: "Database access?", rule: "Verify access control" }
  - { check: "User input?", rule: "Sanitize before storage" }
  - { check: "Network call?", rule: "TLS only, AbortController, no embedded secrets" }

# Git
commit:
  co_author: "Claude <noreply@anthropic.com>"  # Generic — works regardless of which model is active
  never_stage: [".env", "*.key", "credentials*", "node_modules/"]
  push_after_commit: true
  post_commit_hooks: []

# Model routing
# Model names used by Task tool dispatch: haiku, sonnet, opus. These control which model handles sub-agent tasks.
models:
  cheap: "haiku"           # Doc reviews, screenshot analysis, mechanical tasks
  explore: "haiku"         # Codebase search, file scanning
  research: "haiku"        # Technical research, parallel investigation
  implement: "sonnet"      # Write code, integration tasks
  review: "sonnet"         # Code review, sector agents
  plan: "sonnet"           # Planning
  architecture: "opus"     # High-stakes architectural decisions

# Knowledge tier: "files" (default) or "postgres"
#
# Files tier (zero setup):
#   Session history in docs/sessions/*.md
#   Decisions in DECISIONS.md
#   Gotchas in docs/gotchas.md
#   No semantic search, no structured queries
#
# Postgres tier (requires local Postgres):
#   Semantic search across all past sessions (via Ollama embeddings)
#   Structured task/decision/gotcha queries
#   File hash cache (skip re-reading unchanged files)
#   Code index with FTS + vector hybrid search
#   Setup: /pipeline:knowledge setup
#
# Scripts (in plugin's scripts/ directory):
#   pipeline-db.js    — sessions, tasks, decisions, gotchas, raw SQL
#   pipeline-embed.js — code index embeddings + semantic/hybrid search
#   pipeline-cache.js — file hash cache + FTS keyword search
#
knowledge:
  tier: "files"
  # Postgres tier config (uncomment when tier: "postgres"):
  # host: "localhost"
  # port: 5432
  # database: "pipeline_<project_name>"  # Auto-generated from project name — each project gets its own DB
  # user: "postgres"
  # embedding_model: "mxbai-embed-large"  # Any Ollama embedding model — default suggestion, change to your preference

# Integrations — detected during init, skills check before using
integrations:
  sentry:
    enabled: false
    use_in: [debug]
  figma:
    enabled: false
    use_in: [ui-review]
  posthog:
    enabled: false
    use_in: [review]
  ollama:
    enabled: false
    use_in: [knowledge]
  postgres:
    enabled: false
    use_in: [knowledge]
  gamma:
    enabled: false
    use_in: [brainstorm]
  github:
    enabled: false
    use_in: [commit, finish]
  chrome_devtools:
    enabled: false
    use_in: [ui-review]
    dev_url: null  # e.g., http://localhost:5173 — set during init or manually
  playwright:
    enabled: false
    use_in: [ui-review]

# Docs
docs:
  specs_dir: "docs/specs/"
  plans_dir: "docs/plans/"
  research_dir: "docs/research/"
